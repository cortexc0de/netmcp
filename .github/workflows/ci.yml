name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

env:
  PYTHONUNBUFFERED: "1"
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  lint:
    name: "Lint (ruff + mypy)"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run ruff check
        run: ruff check src/netmcp/ tests/
      - name: Run ruff format check
        run: ruff format --check src/netmcp/ tests/
      - name: Run mypy
        run: mypy src/netmcp/ --ignore-missing-imports --no-error-summary
        continue-on-error: true

  test:
    name: "Test (Python ${{ matrix.python-version }})"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run tests with coverage
        run: |
          pytest tests/ -v --ignore=tests/benchmarks --cov=netmcp --cov-report=xml --cov-report=term-missing \
            --cov-fail-under=40 --junitxml=pytest.xml
      - name: Upload coverage artifact
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.xml
            pytest.xml
          retention-days: 30

  coverage-check:
    name: "Coverage gate (≥90%)"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run tests with coverage threshold
        run: |
          pytest tests/ -v --ignore=tests/benchmarks --cov=netmcp --cov-report=xml --cov-report=term-missing \
            --cov-fail-under=90
      - name: Coverage comment on PR
        if: github.event_name == 'pull_request'
        uses: MishaKav/pytest-coverage-comment@main
        with:
          pytest-xml-coverage-path: coverage.xml
          junitxml-path: pytest.xml
          title: "Coverage Report"

  build:
    name: "Build package"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install build tools
        run: pip install build
      - name: Build wheel and sdist
        run: python -m build
      - name: Verify build artifacts
        run: |
          ls -la dist/
          test -f dist/*.whl || exit 1
          test -f dist/*.tar.gz || exit 1
      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 30

  security:
    name: "Security scan"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install bandit safety
      - name: Run bandit (SAST)
        run: bandit -r src/netmcp/ -c pyproject.toml
      - name: Check dependencies for vulnerabilities
        run: pip audit 2>/dev/null || safety check 2>/dev/null || echo "No vulnerability scanner available"

  publish:
    name: "Publish to PyPI"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [lint, test, coverage-check, build, security]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write  # Trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
